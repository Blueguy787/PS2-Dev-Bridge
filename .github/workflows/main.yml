name: Build PS2 ELFs

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ps2dev/ps2dev:latest
    
    defaults:
      run:
        shell: sh

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install build tools
        run: apk add --no-cache make bash

      - name: Build projects
        run: |
          # Source the profile to ensure toolchain paths are loaded
          . /etc/profile
          
          cd ps2dev_bridge/ps2stub && make
          cd ../launcher && make
          cd ../elfs/phase1 && make
          cd ../phase2 && make

      - name: Collect ELFs
        run: |
          mkdir -p dist
          cp ps2dev_bridge/ps2stub/ps2dev_stub.elf              dist/
          cp ps2dev_bridge/launcher/ps2dev_launcher.elf         dist/
          cp ps2dev_bridge/elfs/phase1/hello.elf                dist/
          cp ps2dev_bridge/elfs/phase1/ramdump.elf              dist/
          cp ps2dev_bridge/elfs/phase1/ramdump_interactive.elf  dist/
          cp ps2dev_bridge/elfs/phase2/regdump.elf              dist/
          cp ps2dev_bridge/elfs/phase2/threadlist.elf           dist/
          cp ps2dev_bridge/elfs/phase2/ioppeek.elf              dist/

      - name: Upload ELFs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ps2dev-elfs
          path: dist/
          retention-days: 90
