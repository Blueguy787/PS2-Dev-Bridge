name: Build PS2 ELFs

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ps2dev/ps2dev:latest
    
    # Define environment variables at the job level so they are 
    # available to all steps automatically.
    env:
      PS2DEV: /usr/local/ps2dev
      PS2SDK: /usr/local/ps2dev/ps2sdk
      PATH: /usr/local/ps2dev/bin:/usr/local/ps2dev/ee/bin:/usr/local/ps2dev/iop/bin:/usr/local/ps2dev/dvp/bin:/usr/local/ps2dev/ps2sdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install build tools
        run: apk add --no-cache make

      # The "Set up ps2dev environment" step is no longer needed 
      # because the environment is set via the 'env' block above.

      - name: Build ps2stub
        run: |
          cd ps2dev_bridge/ps2stub
          make

      - name: Build launcher
        run: |
          cd ps2dev_bridge/launcher
          make

      - name: Build phase1 ELFs
        run: |
          cd ps2dev_bridge/elfs/phase1
          make

      - name: Build phase2 ELFs
        run: |
          cd ps2dev_bridge/elfs/phase2
          make

      - name: Collect ELFs
        run: |
          mkdir -p dist
          cp ps2dev_bridge/ps2stub/ps2dev_stub.elf              dist/
          cp ps2dev_bridge/launcher/ps2dev_launcher.elf         dist/
          cp ps2dev_bridge/elfs/phase1/hello.elf                dist/
          cp ps2dev_bridge/elfs/phase1/ramdump.elf              dist/
          cp ps2dev_bridge/elfs/phase1/ramdump_interactive.elf  dist/
          cp ps2dev_bridge/elfs/phase2/regdump.elf              dist/
          cp ps2dev_bridge/elfs/phase2/threadlist.elf           dist/
          cp ps2dev_bridge/elfs/phase2/ioppeek.elf              dist/

      - name: Upload ELFs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ps2dev-elfs
          path: dist/
          retention-days: 90
