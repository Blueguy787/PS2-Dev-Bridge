name: Build PS2 ELFs

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ps2dev/ps2dev:latest
    
    # Explicitly point to the toolchain directories
    env:
      PS2DEV: /usr/local/ps2dev
      PS2SDK: /usr/local/ps2dev/ps2sdk
      # Add all toolchain paths to the PATH variable
      PATH: /usr/local/ps2dev/bin:/usr/local/ps2dev/ee/bin:/usr/local/ps2dev/iop/bin:/usr/local/ps2dev/dvp/bin:/usr/local/ps2dev/ps2sdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      # Force make to use these paths specifically
      EE_PREFIX: ee-
      IOP_PREFIX: iop-
      DVP_PREFIX: dvp-

    defaults:
      run:
        shell: sh

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install build tools
        run: apk add --no-cache make bash

      - name: Build projects
        run: |
          # Use make's variable override to ensure it finds the compiler
          cd ps2dev_bridge/ps2stub && make EE_GCC=/usr/local/ps2dev/ee/bin/ee-gcc
          cd ../launcher && make EE_GCC=/usr/local/ps2dev/ee/bin/ee-gcc
          cd ../elfs/phase1 && make EE_GCC=/usr/local/ps2dev/ee/bin/ee-gcc
          cd ../elfs/phase2 && make EE_GCC=/usr/local/ps2dev/ee/bin/ee-gcc

      - name: Collect ELFs
        run: |
          mkdir -p dist
          cp ps2dev_bridge/ps2stub/ps2dev_stub.elf              dist/
          cp ps2dev_bridge/launcher/ps2dev_launcher.elf         dist/
          cp ps2dev_bridge/elfs/phase1/hello.elf                dist/
          cp ps2dev_bridge/elfs/phase1/ramdump.elf              dist/
          cp ps2dev_bridge/elfs/phase1/ramdump_interactive.elf  dist/
          cp ps2dev_bridge/elfs/phase2/regdump.elf              dist/
          cp ps2dev_bridge/elfs/phase2/threadlist.elf           dist/
          cp ps2dev_bridge/elfs/phase2/ioppeek.elf              dist/

      - name: Upload ELFs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ps2dev-elfs
          path: dist/
          retention-days: 90
