name: Build PS2 ELFs

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ps2dev/ps2dev:latest
    
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install build tools and compatibility layers
        run: |
          # 1. make and bash to run the scripts
          # 2. libc6-compat and gcompat fix the "No such file" error when Alpine 
          #    tries to execute pre-compiled glibc binaries.
          # 3. gmp-dev, mpfr-dev, mpc1-dev are dynamic libs required by the PS2 GCC compiler.
          apk add --no-cache make bash libc6-compat gcompat gmp-dev mpfr-dev mpc1-dev zlib-dev

      - name: Build projects
        run: |
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export PATH=$PS2DEV/bin:$PS2DEV/ee/bin:$PS2DEV/iop/bin:$PS2DEV/dvp/bin:$PS2SDK/bin:$PATH
          
          # In newer ps2dev images, 'ee-gcc' is renamed to 'mips64r5900el-ps2-elf-gcc'. 
          # We create symlinks so Makefiles calling 'ee-gcc' directly still work perfectly.
          if [ ! -f "$PS2DEV/ee/bin/ee-gcc" ] && [ -f "$PS2DEV/ee/bin/mips64r5900el-ps2-elf-gcc" ]; then
            echo "Compiler aliases missing. Creating ee- legacy symlinks..."
            for file in $PS2DEV/ee/bin/mips64r5900el-ps2-elf-*; do
              # Extracts the tool name (e.g., gcc, as, ld) and symlinks it to ee-gcc, ee-as, etc.
              ln -sf "$file" "$PS2DEV/ee/bin/ee-${file##*-}"
            done
          fi
          
          make -C ps2dev_bridge/ps2stub
          make -C ps2dev_bridge/launcher
          make -C ps2dev_bridge/elfs/phase1
          make -C ps2dev_bridge/elfs/phase2

      - name: Collect ELFs
        run: |
          mkdir -p dist
          cp ps2dev_bridge/ps2stub/ps2dev_stub.elf              dist/
          cp ps2dev_bridge/launcher/ps2dev_launcher.elf         dist/
          cp ps2dev_bridge/elfs/phase1/hello.elf                dist/
          cp ps2dev_bridge/elfs/phase1/ramdump.elf              dist/
          cp ps2dev_bridge/elfs/phase1/ramdump_interactive.elf  dist/
          cp ps2dev_bridge/elfs/phase2/regdump.elf              dist/
          cp ps2dev_bridge/elfs/phase2/threadlist.elf           dist/
          cp ps2dev_bridge/elfs/phase2/ioppeek.elf              dist/

      - name: Upload ELFs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ps2dev-elfs
          path: dist/
          retention-days: 90
